<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="資產追蹤">
<meta name="theme-color" content="#0a0a0a">
<title>資產追蹤</title>
<link rel="manifest" href="manifest.json">
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Noto+Sans+TC:wght@400;500;700&display=swap');

  :root {
    --bg: #0f0f0f;
    --bg2: #181818;
    --bg3: #222;
    --border: rgba(255,255,255,0.08);
    --border2: rgba(255,255,255,0.14);
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --accent: #4f9cf9;
    --green: #3ecf8e;
    --red: #f26c6c;
    --amber: #f5a623;
    --purple: #a78bfa;
    --font-num: 'DM Mono', monospace;
    --font: 'Noto Sans TC', sans-serif;
    --r: 12px;
    --r-sm: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html { font-size: 16px; }
  html.fs-sm { font-size: 13px; }
  html.fs-md { font-size: 16px; }
  html.fs-lg { font-size: 20px; }
  html.fs-xl { font-size: 24px; }
  html, body { height: 100%; background: var(--bg); color: var(--text); font-family: var(--font); overflow: hidden; }

  #app { display: flex; flex-direction: column; height: 100dvh; max-width: 430px; margin: 0 auto; }

  /* header */
  .header { padding: 16px 20px 12px; padding-top: calc(16px + env(safe-area-inset-top)); background: var(--bg); border-bottom: 0.5px solid var(--border); display: flex; justify-content: space-between; align-items: flex-end; }
  .header h1 { font-size: 1.125rem; font-weight: 700; letter-spacing: -0.3px; }
  .header-sub { font-size: 0.688rem; color: var(--text2); font-family: var(--font-num); }

  /* nav */
  .nav { display: flex; background: var(--bg); border-bottom: 0.5px solid var(--border); flex-shrink: 0; }
  .nav-btn { flex: 1; padding: 10px 4px; font-size: 0.75rem; font-family: var(--font); border: none; background: none; color: var(--text2); cursor: pointer; position: relative; transition: color 0.15s; }
  .nav-btn.active { color: var(--text); }
  .nav-btn.active::after { content: ''; position: absolute; bottom: 0; left: 20%; right: 20%; height: 2px; background: var(--accent); border-radius: 2px; }

  /* content */
  .content { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }
  .page { display: none; padding: 16px; padding-bottom: calc(16px + env(safe-area-inset-bottom)); }
  .page.active { display: block; }

  /* cards */
  .card { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px; }
  .sec-label { font-size: 0.625rem; color: var(--text3); letter-spacing: 0.08em; text-transform: uppercase; font-family: var(--font-num); margin: 16px 0 8px; }
  .sec-label:first-child { margin-top: 0; }

  /* total box */
  .total-box { background: var(--bg2); border: 0.5px solid var(--border2); border-radius: var(--r); padding: 18px; margin-bottom: 12px; }
  .total-label { font-size: 0.688rem; color: var(--text2); margin-bottom: 4px; }
  .total-val { font-size: 1.75rem; font-weight: 700; font-family: var(--font-num); letter-spacing: -1px; }
  .total-row { display: flex; justify-content: space-between; align-items: flex-start; }
  .total-right { text-align: right; }
  .pnl-val { font-size: 0.938rem; font-weight: 500; font-family: var(--font-num); }

  /* metrics grid */
  .metrics { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 12px; }
  .metric { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r-sm); padding: 12px; }
  .metric-label { font-size: 0.625rem; color: var(--text2); margin-bottom: 6px; }
  .metric-val { font-size: 1.0rem; font-weight: 600; font-family: var(--font-num); }
  .metric-sub { font-size: 0.625rem; color: var(--text3); margin-top: 2px; font-family: var(--font-num); }

  /* list items */
  .item { display: flex; justify-content: space-between; align-items: flex-start; padding: 10px 0; border-bottom: 0.5px solid var(--border); }
  .item:last-child { border-bottom: none; padding-bottom: 0; }
  .item-left { flex: 1; min-width: 0; }
  .item-ticker { font-size: 0.875rem; font-weight: 600; margin-bottom: 2px; display: flex; align-items: center; gap: 6px; }
  .item-meta { font-size: 0.688rem; color: var(--text2); font-family: var(--font-num); }
  .item-right { text-align: right; flex-shrink: 0; }
  .item-amt { font-size: 0.875rem; font-weight: 600; font-family: var(--font-num); margin-bottom: 2px; }
  .item-sub { font-size: 0.688rem; color: var(--text2); font-family: var(--font-num); }

  .badge { font-size: 0.625rem; padding: 1px 7px; border-radius: 6px; font-family: var(--font-num); flex-shrink: 0; }
  .badge-us  { background: rgba(79,156,249,0.15); color: var(--accent); }
  .badge-tw  { background: rgba(62,207,142,0.15); color: var(--green); }
  .badge-fut { background: rgba(245,166,35,0.15); color: var(--amber); }
  .badge-dca { background: rgba(167,139,250,0.15); color: var(--purple); }

  .pos { color: var(--green); }
  .neg { color: var(--red); }
  .neu { color: var(--text2); }

  /* form */
  .form-section { background: var(--bg2); border: 0.5px solid var(--border); border-radius: var(--r); padding: 14px 16px; margin-bottom: 12px; }
  .form-title { font-size: 0.812rem; font-weight: 600; margin-bottom: 12px; }
  .form-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group.full { grid-column: 1 / -1; }
  .form-group label { font-size: 0.688rem; color: var(--text2); }
  .form-group select, .form-group input {
    background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--r-sm);
    color: var(--text); font-family: var(--font); font-size: 0.812rem; padding: 8px 10px;
    outline: none; transition: border-color 0.15s; -webkit-appearance: none;
  }
  .form-group select:focus, .form-group input:focus { border-color: var(--accent); }
  .btn-primary { width: 100%; padding: 11px; background: var(--accent); color: #fff; border: none; border-radius: var(--r-sm); font-size: 0.875rem; font-weight: 600; font-family: var(--font); cursor: pointer; margin-top: 6px; transition: opacity 0.15s; }
  .btn-primary:active { opacity: 0.8; }
  .add-btn { width: 100%; padding: 10px; background: none; border: 0.5px dashed var(--border2); border-radius: var(--r-sm); color: var(--text2); font-size: 0.812rem; font-family: var(--font); cursor: pointer; transition: all 0.15s; }
  .add-btn:hover { background: var(--bg2); color: var(--text); }
  .del-btn { background: none; border: none; color: var(--text3); font-size: 1.0rem; cursor: pointer; padding: 0 0 0 8px; transition: color 0.15s; flex-shrink: 0; }
  .del-btn:hover { color: var(--red); }

  /* clec 442 */
  .clec-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 14px; }
  .clec-title { font-size: 0.938rem; font-weight: 700; }
  .clec-sub { font-size: 0.688rem; color: var(--text2); font-family: var(--font-num); }
  .status-ok { color: var(--green); font-size: 0.688rem; font-weight: 600; font-family: var(--font-num); }
  .status-warn { color: var(--amber); font-size: 0.688rem; font-weight: 600; font-family: var(--font-num); }
  .status-err { color: var(--red); font-size: 0.688rem; font-weight: 600; font-family: var(--font-num); }
  .clec-row { margin-bottom: 14px; }
  .clec-row-header { display: flex; justify-content: space-between; align-items: flex-end; margin-bottom: 5px; }
  .clec-ticker { font-size: 0.812rem; font-weight: 600; }
  .clec-pcts { font-size: 0.75rem; font-family: var(--font-num); }
  .clec-track { height: 10px; background: var(--bg3); border-radius: 5px; overflow: visible; position: relative; }
  .clec-fill { height: 100%; border-radius: 5px; transition: width 0.4s; }
  .clec-target-line { position: absolute; top: -3px; bottom: -3px; width: 2px; border-radius: 1px; }
  .clec-hint { font-size: 0.625rem; color: var(--text3); font-family: var(--font-num); margin-top: 3px; }
  .clec-total-card { background: var(--bg3); border-radius: var(--r-sm); padding: 10px 14px; margin-bottom: 14px; display: flex; justify-content: space-between; align-items: center; }
  .clec-edit-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }
  .clec-edit-row label { font-size: 0.688rem; color: var(--text2); flex-shrink: 0; width: 68px; }
  .clec-edit-row input { flex: 1; background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--r-sm); color: var(--text); font-family: var(--font-num); font-size: 0.812rem; padding: 6px 10px; outline: none; }
  .chip { display: inline-block; font-size: 0.625rem; padding: 2px 8px; border-radius: 6px; font-family: var(--font-num); }
  .chip-blue { background: rgba(79,156,249,0.15); color: #4f9cf9; }
  .chip-amber { background: rgba(245,166,35,0.15); color: #f5a623; }
  .chip-purple { background: rgba(167,139,250,0.15); color: #a78bfa; }

  /* dca progress */
  .dca-row1 { display: flex; justify-content: space-between; align-items: center; margin-bottom: 3px; }
  .dca-name { font-size: 0.875rem; font-weight: 600; }
  .dca-status { font-size: 0.625rem; padding: 2px 8px; border-radius: 6px; background: rgba(62,207,142,0.15); color: var(--green); }
  .dca-info { font-size: 0.688rem; color: var(--text2); font-family: var(--font-num); margin-bottom: 6px; }
  .progress-bar { height: 3px; background: var(--bg3); border-radius: 2px; overflow: hidden; }
  .progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.3s; }

  /* chart */
  .chart-wrap { position: relative; height: 180px; margin: 8px 0; }
  .legend { display: flex; flex-wrap: wrap; gap: 8px 16px; font-size: 0.688rem; color: var(--text2); margin-top: 8px; }
  .legend span { display: flex; align-items: center; gap: 5px; }
  .dot { width: 8px; height: 8px; border-radius: 2px; flex-shrink: 0; }

  /* empty state */
  .empty { text-align: center; padding: 40px 20px; color: var(--text3); font-size: 0.812rem; }
  .empty-icon { font-size: 2.0rem; margin-bottom: 8px; }

  /* toast */
  .toast { position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px); background: var(--bg3); border: 0.5px solid var(--border2); border-radius: var(--r-sm); padding: 10px 18px; font-size: 0.812rem; opacity: 0; transition: all 0.25s; pointer-events: none; z-index: 100; white-space: nowrap; }
  .toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }

  /* modal */
  .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.7); z-index: 50; display: flex; align-items: flex-end; opacity: 0; pointer-events: none; transition: opacity 0.2s; }
  .modal-overlay.open { opacity: 1; pointer-events: all; }
  .modal { background: var(--bg2); border-radius: var(--r) var(--r) 0 0; padding: 20px; padding-bottom: calc(20px + env(safe-area-inset-bottom)); width: 100%; transform: translateY(100%); transition: transform 0.25s cubic-bezier(0.32,0.72,0,1); }
  .modal-overlay.open .modal { transform: translateY(0); }
  .modal-handle { width: 36px; height: 4px; background: var(--border2); border-radius: 2px; margin: 0 auto 16px; }
  .modal-title { font-size: 0.938rem; font-weight: 600; margin-bottom: 16px; }
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <div>
      <h1>資產追蹤</h1>
      <div class="header-sub" id="last-updated"></div>
    </div>
    <div style="display:flex;align-items:center;gap:10px">
      <div style="display:flex;gap:4px;align-items:center">
        <button onclick="setFs(-1)" style="background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;color:var(--text2);font-size:16px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center">A</button>
        <button onclick="setFs(1)" style="background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;color:var(--text);font-size:20px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center">A</button>
        <button id="refresh-btn" onclick="fetchAllPrices()" title="更新報價" style="background:var(--bg3);border:0.5px solid var(--border2);border-radius:6px;color:var(--text2);font-size:14px;width:30px;height:30px;cursor:pointer;display:flex;align-items:center;justify-content:center">↻</button>
      </div>
      <div style="text-align:right">
        <div style="font-size:0.7rem;color:var(--text2)">總資產</div>
        <div style="font-size:1rem;font-weight:700;font-family:var(--font-num)" id="header-total">$0</div>
      </div>
    </div>
  </div>
  <nav class="nav">
    <button class="nav-btn active" onclick="showPage('overview',this)">總覽</button>
    <button class="nav-btn" onclick="showPage('positions',this)">持倉</button>
    <button class="nav-btn" onclick="showPage('txns',this)">交易</button>
    <button class="nav-btn" onclick="showPage('dca',this)">定期定額</button>
    <button class="nav-btn" onclick="showPage('clec',this)">CLEC</button>
  </nav>
  <div class="content">

    <!-- 總覽 -->
    <div id="page-overview" class="page active">
      <div class="total-box">
        <div class="total-row">
          <div><div class="total-label">總資產（TWD）</div><div class="total-val" id="total-twd">$0</div></div>
          <div class="total-right"><div class="total-label">未實現損益</div><div class="pnl-val" id="total-pnl">$0</div></div>
        </div>
      </div>
      <div class="metrics">
        <div class="metric"><div class="metric-label">美股帳戶</div><div class="metric-val" id="m-us">$0</div><div class="metric-sub" id="m-us-cnt">0 支股票</div></div>
        <div class="metric"><div class="metric-label">台股證券</div><div class="metric-val" id="m-tw">$0</div><div class="metric-sub" id="m-tw-cnt">0 支股票</div></div>
        <div class="metric"><div class="metric-label">台股期貨</div><div class="metric-val" id="m-fut">$0</div><div class="metric-sub" id="m-fut-cnt">0 口</div></div>
        <div class="metric"><div class="metric-label">定期定額</div><div class="metric-val" id="m-dca">$0</div><div class="metric-sub" id="m-dca-cnt">0 個計畫</div></div>
      </div>
      <div class="card">
        <div style="font-size:12px;color:var(--text2);margin-bottom:8px;">資產佔比</div>
        <div class="chart-wrap"><canvas id="pieChart" role="img" aria-label="資產佔比圓餅圖"></canvas></div>
        <div class="legend" id="pie-legend"></div>
      </div>
    </div>

    <!-- 持倉 -->
    <div id="page-positions" class="page">
      <div id="pos-list"></div>
      <button class="add-btn" onclick="openAddPosition()">＋ 新增持倉</button>
    </div>

    <!-- 交易 -->
    <div id="page-txns" class="page">
      <div class="form-section">
        <div class="form-title">記錄新交易</div>
        <div class="form-grid">
          <div class="form-group"><label>帳戶</label>
            <select id="tx-account"><option value="us">美股</option><option value="tw">台股證券</option><option value="fut">台股期貨</option></select></div>
          <div class="form-group"><label>類型</label>
            <select id="tx-type"><option value="buy">買入</option><option value="sell">賣出</option><option value="open">開倉</option><option value="close">平倉</option></select></div>
          <div class="form-group"><label>代碼 / 名稱</label><input id="tx-ticker" type="text" placeholder="AAPL / 2330"></div>
          <div class="form-group"><label>日期</label><input id="tx-date" type="date"></div>
          <div class="form-group"><label>股數 / 口數</label><input id="tx-shares" type="number" placeholder="0" min="0"></div>
          <div class="form-group"><label>成交價格</label><input id="tx-price" type="number" placeholder="0.00" min="0" step="0.01"></div>
          <div class="form-group full"><label>備註（選填）</label><input id="tx-note" type="text" placeholder="e.g. 季報後買入"></div>
        </div>
        <button class="btn-primary" onclick="addTx()">記錄交易</button>
      </div>
      <div class="sec-label">交易紀錄</div>
      <div class="card" id="tx-list"></div>
    </div>

    <!-- 定期定額 -->
    <div id="page-dca" class="page">
      <div class="form-section">
        <div class="form-title">新增定期定額計畫</div>
        <div class="form-grid">
          <div class="form-group"><label>股票代碼</label><input id="dca-ticker" type="text" placeholder="QQQ / 0050"></div>
          <div class="form-group"><label>帳戶</label>
            <select id="dca-account"><option value="us">美股</option><option value="tw">台股證券</option></select></div>
          <div class="form-group"><label>金額</label><input id="dca-amount" type="number" placeholder="5000" min="0"></div>
          <div class="form-group"><label>幣別</label>
            <select id="dca-currency"><option value="TWD">TWD</option><option value="USD">USD</option></select></div>
          <div class="form-group"><label>頻率</label>
            <select id="dca-freq"><option value="monthly">每月</option><option value="bimonthly">每兩週</option><option value="quarterly">每季</option></select></div>
          <div class="form-group"><label>扣款日</label><input id="dca-day" type="number" placeholder="1" min="1" max="31"></div>
          <div class="form-group"><label>開始日期</label><input id="dca-start" type="date"></div>
          <div class="form-group"><label>已執行期數</label><input id="dca-done" type="number" placeholder="0" min="0"></div>
        </div>
        <button class="btn-primary" onclick="addDca()">建立計畫</button>
      </div>
      <div class="sec-label">進行中的計畫</div>
      <div id="dca-list"></div>
    </div>

  </div>
</div>

    <!-- CLEC 442 -->
    <div id="page-clec" class="page">
      <div class="card">
        <div class="clec-header">
          <div><div class="clec-title">CLEC 442 配置</div><div class="clec-sub">目標：00662 40% ／ 00675L 40% ／ 00865B 20%</div></div>
          <div id="clec-overall-status"></div>
        </div>
        <div class="clec-total-card">
          <div><div style="font-size:10px;color:var(--text3);margin-bottom:3px">CLEC 總市值（TWD）</div><div style="font-size:18px;font-weight:700;font-family:var(--font-num)" id="clec-total-val">$0</div></div>
          <div style="text-align:right"><div style="font-size:10px;color:var(--text3);margin-bottom:3px">未實現損益</div><div style="font-size:14px;font-weight:600;font-family:var(--font-num)" id="clec-total-pnl">$0</div></div>
        </div>
        <div id="clec-bars"></div>
      </div>

      <div class="card">
        <div class="form-title" style="font-size:13px;margin-bottom:12px">更新持倉市值</div>
        <div class="clec-edit-row"><label>00662 <span class="chip chip-blue">股債</span></label><input id="clec-v-00662" type="number" placeholder="0" min="0"></div>
        <div class="clec-edit-row"><label>00675L <span class="chip chip-amber">槓桿</span></label><input id="clec-v-00675L" type="number" placeholder="0" min="0"></div>
        <div class="clec-edit-row"><label>00865B <span class="chip chip-purple">債券</span></label><input id="clec-v-00865B" type="number" placeholder="0" min="0"></div>
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-top:8px">
          <div class="form-group"><label style="font-size:11px;color:var(--text2)">均價（00662）</label><input id="clec-c-00662" type="number" placeholder="0" min="0" step="0.01"></div>
          <div class="form-group"><label style="font-size:11px;color:var(--text2)">均價（00675L）</label><input id="clec-c-00675L" type="number" placeholder="0" min="0" step="0.01"></div>
          <div class="form-group"><label style="font-size:11px;color:var(--text2)">均價（00865B）</label><input id="clec-c-00865B" type="number" placeholder="0" min="0" step="0.01"></div>
        </div>
        <button class="btn-primary" style="margin-top:8px" onclick="saveClec()">更新 CLEC 配置</button>
      </div>

      <div class="card" id="clec-rebalance-card" style="display:none">
        <div style="font-size:13px;font-weight:600;margin-bottom:10px">再平衡建議</div>
        <div id="clec-rebalance-content"></div>
      </div>
    </div>

  </div>
</div>

<!-- 新增持倉 modal -->
<div class="modal-overlay" id="pos-modal" onclick="closeModal(event)">
  <div class="modal">
    <div class="modal-handle"></div>
    <div class="modal-title">新增持倉</div>
    <div class="form-grid">
      <div class="form-group"><label>帳戶</label>
        <select id="pos-account"><option value="us">美股</option><option value="tw">台股證券</option><option value="fut">台股期貨</option></select></div>
      <div class="form-group"><label>代碼</label><input id="pos-ticker" type="text" placeholder="AAPL"></div>
      <div class="form-group"><label>名稱（選填）</label><input id="pos-name" type="text" placeholder="蘋果"></div>
      <div class="form-group"><label>持股數 / 口數</label><input id="pos-shares" type="number" placeholder="100" min="0"></div>
      <div class="form-group"><label>均價 / 成本</label><input id="pos-cost" type="number" placeholder="0.00" min="0" step="0.01"></div>
      <div class="form-group"><label>現價</label><input id="pos-price" type="number" placeholder="0.00" min="0" step="0.01"></div>
    </div>
    <button class="btn-primary" style="margin-top:12px" onclick="savePosition()">儲存持倉</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<script>
// ── Storage ──────────────────────────────────────────
const DB = {
  get: k => { try { return JSON.parse(localStorage.getItem(k)) || [] } catch { return [] } },
  set: (k, v) => localStorage.setItem(k, JSON.stringify(v)),
};

let positions = DB.get('positions');
let transactions = DB.get('transactions');
let dcaPlans = DB.get('dcaPlans');
let clecData = (() => { try { return JSON.parse(localStorage.getItem('clecData')) || {} } catch { return {} } })();

function save() {
  DB.set('positions', positions);
  DB.set('transactions', transactions);
  DB.set('dcaPlans', dcaPlans);
  render();
}

// ── Navigation ────────────────────────────────────────
function showPage(id, btn) {
  document.querySelectorAll('.page').forEach(p => p.classList.remove('active'));
  document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
  document.getElementById('page-' + id).classList.add('active');
  btn.classList.add('active');
}

// ── Toast ─────────────────────────────────────────────
function toast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2200);
}

// ── Modal ─────────────────────────────────────────────
function openAddPosition() {
  document.getElementById('pos-modal').classList.add('open');
}
function closeModal(e) {
  if (e.target === e.currentTarget) document.getElementById('pos-modal').classList.remove('open');
}

// ── Formatters ────────────────────────────────────────
const acctLabel = { us: '美股', tw: '台股', fut: '期貨' };
const acctBadge = { us: 'badge-us', tw: 'badge-tw', fut: 'badge-fut' };
const freqLabel = { monthly: '每月', bimonthly: '每兩週', quarterly: '每季' };

function fmtNum(n, decimals=0) {
  return new Intl.NumberFormat('zh-TW', { maximumFractionDigits: decimals, minimumFractionDigits: decimals }).format(n);
}
function fmtMoney(n, short=true) {
  const abs = Math.abs(n);
  if (short && abs >= 1000000) return (n/1000000).toFixed(1) + 'M';
  if (short && abs >= 10000) return Math.round(n/1000) + 'K';
  return fmtNum(n);
}
function pnlClass(n) { return n > 0 ? 'pos' : n < 0 ? 'neg' : 'neu'; }
function pnlSign(n) { return n > 0 ? '+' : ''; }

// ── Compute totals ────────────────────────────────────
function computeTotals() {
  let byAcct = { us: 0, tw: 0, fut: 0, dca: 0 };
  let totalPnl = 0;
  positions.forEach(p => {
    const val = p.shares * p.price;
    const cost = p.shares * p.cost;
    const pnl = val - cost;
    byAcct[p.account] = (byAcct[p.account] || 0) + val;
    totalPnl += pnl;
  });
  dcaPlans.forEach(d => {
    byAcct.dca += d.amount * d.done * (d.currency === 'USD' ? 32 : 1);
  });
  const total = byAcct.us * 32 + byAcct.tw + byAcct.fut + byAcct.dca;
  return { byAcct, total, totalPnl };
}

// ── Render ────────────────────────────────────────────
let pieChart = null;

function render() {
  const { byAcct, total, totalPnl } = computeTotals();
  const now = new Date().toLocaleString('zh-TW', { month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit' });
  document.getElementById('last-updated').textContent = '更新 ' + now;
  document.getElementById('header-total').textContent = '$' + fmtMoney(total);
  document.getElementById('total-twd').textContent = '$' + fmtNum(Math.round(total));
  const pEl = document.getElementById('total-pnl');
  pEl.textContent = pnlSign(totalPnl) + '$' + fmtNum(Math.round(Math.abs(totalPnl)));
  pEl.className = 'pnl-val ' + pnlClass(totalPnl);

  const usCnt = positions.filter(p=>p.account==='us').length;
  const twCnt = positions.filter(p=>p.account==='tw').length;
  const futCnt = positions.filter(p=>p.account==='fut').length;
  document.getElementById('m-us').textContent = '$' + fmtMoney(byAcct.us * 32);
  document.getElementById('m-tw').textContent = '$' + fmtMoney(byAcct.tw);
  document.getElementById('m-fut').textContent = '$' + fmtMoney(byAcct.fut);
  document.getElementById('m-dca').textContent = '$' + fmtMoney(byAcct.dca);
  document.getElementById('m-us-cnt').textContent = usCnt + ' 支股票';
  document.getElementById('m-tw-cnt').textContent = twCnt + ' 支股票';
  document.getElementById('m-fut-cnt').textContent = futCnt + ' 口';
  document.getElementById('m-dca-cnt').textContent = dcaPlans.length + ' 個計畫';

  renderPie(byAcct, total);
  renderPositions();
  renderTxns();
  renderDca();
  renderClec();
}

function renderPie(byAcct, total) {
  const labels = ['美股', '台股證券', '台股期貨', '定期定額'];
  const vals = [byAcct.us * 32, byAcct.tw, byAcct.fut, byAcct.dca];
  const colors = ['#4f9cf9','#3ecf8e','#f5a623','#a78bfa'];
  const pcts = vals.map(v => total > 0 ? ((v/total)*100).toFixed(1) : '0.0');

  document.getElementById('pie-legend').innerHTML = labels.map((l,i) =>
    `<span><span class="dot" style="background:${colors[i]}"></span>${l} ${pcts[i]}%</span>`
  ).join('');

  const ctx = document.getElementById('pieChart').getContext('2d');
  if (pieChart) pieChart.destroy();
  pieChart = new Chart(ctx, {
    type: 'doughnut',
    data: { labels, datasets: [{ data: vals.map(v => Math.max(v, 0)), backgroundColor: colors, borderWidth: 2, borderColor: '#0f0f0f', hoverOffset: 4 }] },
    options: { responsive: true, maintainAspectRatio: false, cutout: '62%',
      plugins: { legend: { display: false }, tooltip: { callbacks: { label: ctx => ` ${ctx.label}: ${pcts[ctx.dataIndex]}%` } } } }
  });
}

function renderPositions() {
  const grouped = { us: [], tw: [], fut: [] };
  positions.forEach(p => (grouped[p.account] || []).push(p));
  const acctNames = { us: '美股帳戶', tw: '台股證券', fut: '台股期貨' };
  let html = '';
  Object.entries(grouped).forEach(([acct, list]) => {
    if (list.length === 0) return;
    html += `<div class="sec-label">${acctNames[acct]}</div><div class="card">`;
    list.forEach((p) => {
      const livePrice = livePrices[p.ticker];
      const displayPrice = livePrice !== undefined ? livePrice : p.price;
      const val = p.shares * displayPrice;
      const pnl = val - p.shares * p.cost;
      const pnlPct = p.cost > 0 ? (pnl / (p.shares * p.cost) * 100).toFixed(1) : '0.0';
      const priceTag = livePrice !== undefined
        ? `<span style="font-size:0.6rem;color:var(--green);margin-left:4px">即時</span>`
        : `<span style="font-size:0.6rem;color:var(--text3);margin-left:4px">手動</span>`;
      html += `<div class="item">
        <div class="item-left">
          <div class="item-ticker"><span>${p.ticker}</span><span class="badge ${acctBadge[p.account]}">${acctLabel[p.account]}</span>${priceTag}</div>
          <div class="item-meta">${fmtNum(p.shares)} 股｜均價 ${fmtNum(p.cost, 2)}｜現價 ${fmtNum(displayPrice, 2)}</div>
        </div>
        <div class="item-right" style="display:flex;align-items:center;gap:6px">
          <div>
            <div class="item-amt ${pnlClass(pnl)}">${pnlSign(pnl)}$${fmtNum(Math.abs(Math.round(pnl)))}</div>
            <div class="item-sub">${pnlSign(pnl)}${pnlPct}%</div>
          </div>
          <button class="del-btn" onclick="delPosition(${positions.indexOf(p)})">×</button>
        </div>
      </div>`;
    });
    html += '</div>';
  });
  if (html === '') html = `<div class="empty"><div class="empty-icon">📊</div>尚無持倉紀錄<br>點下方按鈕新增</div>`;
  document.getElementById('pos-list').innerHTML = html;
}

function renderTxns() {
  const el = document.getElementById('tx-list');
  if (transactions.length === 0) { el.innerHTML = '<div class="empty" style="padding:24px"><div class="empty-icon">📝</div>尚無交易紀錄</div>'; return; }
  const sorted = [...transactions].reverse();
  const typeLabel = { buy:'買入', sell:'賣出', open:'開倉', close:'平倉' };
  const typeColor = { buy: '#4f9cf9', sell: '#3ecf8e', open: '#f5a623', close: '#f26c6c' };
  el.innerHTML = sorted.map((t, ri) => {
    const i = transactions.length - 1 - ri;
    return `<div class="item">
      <div class="item-left">
        <div class="item-ticker">${t.ticker} <span class="badge ${acctBadge[t.account]}">${acctLabel[t.account]}</span></div>
        <div class="item-meta">${t.date} ${t.note ? '・' + t.note : ''}</div>
      </div>
      <div class="item-right" style="display:flex;align-items:center;gap:6px">
        <div>
          <div class="item-amt" style="color:${typeColor[t.type]}">${typeLabel[t.type]}</div>
          <div class="item-sub">${fmtNum(t.shares)} 股 @ ${fmtNum(t.price, 2)}</div>
        </div>
        <button class="del-btn" onclick="delTx(${i})">×</button>
      </div>
    </div>`;
  }).join('');
}

function renderDca() {
  const el = document.getElementById('dca-list');
  if (dcaPlans.length === 0) { el.innerHTML = `<div class="empty"><div class="empty-icon">🔄</div>尚無定期定額計畫<br>填寫上方表單新增</div>`; return; }
  el.innerHTML = dcaPlans.map((d, i) => {
    const total = d.done + (d.target || 12);
    const pct = Math.round((d.done / total) * 100);
    return `<div class="card">
      <div class="dca-row1">
        <div class="dca-name">${d.ticker} <span class="badge badge-dca">${d.currency}</span></div>
        <span class="dca-status">執行中</span>
      </div>
      <div class="dca-info">${freqLabel[d.freq]} ${d.day} 日・${d.currency} ${fmtNum(d.amount)}・已執行 ${d.done} 期</div>
      <div class="progress-bar"><div class="progress-fill" style="width:${pct}%"></div></div>
      <div style="display:flex;justify-content:space-between;align-items:center;margin-top:8px">
        <div style="font-size:11px;color:var(--text3);font-family:var(--font-num)">累計投入 ${d.currency} ${fmtNum(d.amount * d.done)}</div>
        <button class="del-btn" onclick="delDca(${i})" style="font-size:13px;color:var(--text3)">刪除</button>
      </div>
    </div>`;
  }).join('');
}

// ── Actions ───────────────────────────────────────────
function addTx() {
  const t = document.getElementById('tx-ticker').value.trim().toUpperCase();
  const price = parseFloat(document.getElementById('tx-price').value);
  const shares = parseFloat(document.getElementById('tx-shares').value);
  const date = document.getElementById('tx-date').value;
  if (!t || !price || !shares || !date) { toast('⚠️ 請填寫所有必填欄位'); return; }
  transactions.push({
    ticker: t,
    account: document.getElementById('tx-account').value,
    type: document.getElementById('tx-type').value,
    date, shares, price,
    note: document.getElementById('tx-note').value.trim()
  });
  ['tx-ticker','tx-price','tx-shares','tx-note','tx-date'].forEach(id => document.getElementById(id).value = '');
  save();
  toast('✓ 交易已記錄');
}

function delTx(i) {
  if (!confirm('確定刪除這筆交易？')) return;
  transactions.splice(i, 1);
  save();
  toast('已刪除');
}

function savePosition() {
  const ticker = document.getElementById('pos-ticker').value.trim().toUpperCase();
  const shares = parseFloat(document.getElementById('pos-shares').value);
  const cost = parseFloat(document.getElementById('pos-cost').value);
  const price = parseFloat(document.getElementById('pos-price').value);
  if (!ticker || !shares || !cost || !price) { toast('⚠️ 請填寫所有欄位'); return; }
  positions.push({
    ticker, shares, cost, price,
    account: document.getElementById('pos-account').value,
    name: document.getElementById('pos-name').value.trim()
  });
  ['pos-ticker','pos-shares','pos-cost','pos-price','pos-name'].forEach(id => document.getElementById(id).value = '');
  document.getElementById('pos-modal').classList.remove('open');
  save();
  toast('✓ 持倉已新增');
}

function delPosition(i) {
  if (!confirm('確定刪除這筆持倉？')) return;
  positions.splice(i, 1);
  save();
  toast('已刪除');
}

function addDca() {
  const ticker = document.getElementById('dca-ticker').value.trim().toUpperCase();
  const amount = parseFloat(document.getElementById('dca-amount').value);
  const day = parseInt(document.getElementById('dca-day').value);
  const start = document.getElementById('dca-start').value;
  const done = parseInt(document.getElementById('dca-done').value) || 0;
  if (!ticker || !amount || !day || !start) { toast('⚠️ 請填寫所有必填欄位'); return; }
  dcaPlans.push({
    ticker, amount, day, start, done,
    account: document.getElementById('dca-account').value,
    currency: document.getElementById('dca-currency').value,
    freq: document.getElementById('dca-freq').value,
    target: 12
  });
  ['dca-ticker','dca-amount','dca-day','dca-start','dca-done'].forEach(id => document.getElementById(id).value = '');
  save();
  toast('✓ 定期定額計畫已建立');
}

function delDca(i) {
  if (!confirm('確定刪除此計畫？')) return;
  dcaPlans.splice(i, 1);
  save();
  toast('已刪除');
}

// ── CLEC 442 ─────────────────────────────────────────
const CLEC_TARGETS = [
  { ticker: '00662', name: '富邦美國股市', target: 40, color: '#4f9cf9', chip: 'chip-blue' },
  { ticker: '00675L', name: '富邦臺灣加權正2', target: 40, color: '#f5a623', chip: 'chip-amber' },
  { ticker: '00865B', name: '中信美國公債20年', target: 20, color: '#a78bfa', chip: 'chip-purple' },
];
const CLEC_TOL = 3;

function saveClec() {
  CLEC_TARGETS.forEach(({ ticker }) => {
    const v = parseFloat(document.getElementById('clec-v-' + ticker).value) || 0;
    const c = parseFloat(document.getElementById('clec-c-' + ticker)?.value) || 0;
    clecData[ticker] = { value: v, cost: c };
  });
  localStorage.setItem('clecData', JSON.stringify(clecData));
  render();
  toast('✓ CLEC 配置已更新');
}

function renderClec() {
  const vals = CLEC_TARGETS.map(({ ticker }) => (clecData[ticker]?.value || 0));
  const costs = CLEC_TARGETS.map(({ ticker }) => (clecData[ticker]?.cost || 0));
  const total = vals.reduce((a, b) => a + b, 0);
  const totalCost = costs.reduce((a, b) => a + b, 0);
  const totalPnl = total - totalCost;

  document.getElementById('clec-total-val').textContent = '$' + fmtNum(Math.round(total));
  const pnlEl = document.getElementById('clec-total-pnl');
  pnlEl.textContent = pnlSign(totalPnl) + '$' + fmtNum(Math.abs(Math.round(totalPnl)));
  pnlEl.className = 'pnl-val ' + pnlClass(totalPnl);

  const pcts = vals.map(v => total > 0 ? (v / total * 100) : 0);
  const allOk = CLEC_TARGETS.every((t, i) => Math.abs(pcts[i] - t.target) <= CLEC_TOL);
  const statusEl = document.getElementById('clec-overall-status');
  if (total === 0) {
    statusEl.innerHTML = '';
  } else if (allOk) {
    statusEl.innerHTML = '<span class="status-ok">✓ 符合</span>';
  } else {
    statusEl.innerHTML = '<span class="status-err">! 需再平衡</span>';
  }

  let barsHtml = '';
  CLEC_TARGETS.forEach((t, i) => {
    const pct = pcts[i];
    const diff = pct - t.target;
    const diffStr = diff >= 0 ? '+' + diff.toFixed(1) + '%' : diff.toFixed(1) + '%';
    const diffColor = Math.abs(diff) <= CLEC_TOL ? 'var(--green)' : Math.abs(diff) <= 6 ? 'var(--amber)' : 'var(--red)';
    const barWidth = Math.min(pct, 100);
    const targetPos = Math.min(t.target, 100);

    barsHtml += `<div class="clec-row">
      <div class="clec-row-header">
        <div class="clec-ticker">${t.ticker} <span class="chip ${t.chip}" style="font-size:9px">${t.name}</span></div>
        <div class="clec-pcts">
          <span style="font-size:14px;font-weight:700">${pct.toFixed(1)}%</span>
          <span style="color:${diffColor};font-size:11px;margin-left:4px">${total > 0 ? diffStr : ''}</span>
          <span style="color:var(--text3);font-size:11px"> / 目標 ${t.target}%</span>
        </div>
      </div>
      <div class="clec-track">
        <div class="clec-fill" style="width:${barWidth}%;background:${t.color}"></div>
        <div class="clec-target-line" style="left:${targetPos}%;background:rgba(255,255,255,0.35)"></div>
      </div>
      <div class="clec-hint">市值 $${fmtNum(Math.round(vals[i]))} ${costs[i] > 0 ? '・成本 $' + fmtNum(Math.round(costs[i])) + '・損益 ' + pnlSign(vals[i]-costs[i]) + '$' + fmtNum(Math.abs(Math.round(vals[i]-costs[i]))) : ''}</div>
    </div>`;
  });
  document.getElementById('clec-bars').innerHTML = barsHtml;

  const rbCard = document.getElementById('clec-rebalance-card');
  const rbContent = document.getElementById('clec-rebalance-content');
  if (total > 0 && !allOk) {
    rbCard.style.display = '';
    let rbHtml = '';
    CLEC_TARGETS.forEach((t, i) => {
      const diff = pcts[i] - t.target;
      if (Math.abs(diff) <= CLEC_TOL) return;
      const targetVal = total * t.target / 100;
      const gap = targetVal - vals[i];
      const action = gap > 0 ? '加碼' : '減碼';
      const color = gap > 0 ? 'var(--green)' : 'var(--amber)';
      rbHtml += `<div style="display:flex;justify-content:space-between;align-items:center;padding:7px 0;border-bottom:0.5px solid var(--border)">
        <div style="font-size:13px;font-weight:600">${t.ticker}</div>
        <div style="text-align:right">
          <span style="color:${color};font-size:12px;font-weight:600">${action} </span>
          <span style="font-size:12px;font-family:var(--font-num)">$${fmtNum(Math.abs(Math.round(gap)))}</span>
          <div style="font-size:10px;color:var(--text3)">${pcts[i].toFixed(1)}% → ${t.target}%</div>
        </div>
      </div>`;
    });
    rbContent.innerHTML = rbHtml || '<div style="font-size:12px;color:var(--text2)">配置良好</div>';
  } else {
    rbCard.style.display = 'none';
  }

  CLEC_TARGETS.forEach(({ ticker }) => {
    const inp = document.getElementById('clec-v-' + ticker);
    if (inp && !inp.value && clecData[ticker]?.value) inp.value = clecData[ticker].value;
    const cinp = document.getElementById('clec-c-' + ticker);
    if (cinp && !cinp.value && clecData[ticker]?.cost) cinp.value = clecData[ticker].cost;
  });
}

// ── 即時報價 ─────────────────────────────────────────
let livePrices = {};

async function fetchTW(tickers) {
  // 台股：用證交所 mis API，ETF 在上市用 tse，上櫃用 otc
  // 00662, 00675L, 00865B, 0050 等 ETF 為上市
  const otcPrefixes = ['006201','006205','00663','00668','00669','006205'];
  const parts = tickers.map(t => {
    const clean = t.replace(/\s/g,'');
    return `tse_${clean}.tw`;
  });
  const query = parts.join('|');
  try {
    const res = await fetch(`https://mis.twse.com.tw/stock/api/getStockInfo.jsp?ex_ch=${query}&json=1&delay=0`);
    const data = await res.json();
    if (data.msgArray) {
      data.msgArray.forEach(item => {
        const ticker = item.c;
        const price = parseFloat(item.z !== '-' ? item.z : item.y);
        if (!isNaN(price)) livePrices[ticker] = price;
      });
    }
  } catch(e) { console.warn('台股報價失敗', e); }
}

async function fetchUS(tickers) {
  // 美股：透過 allorigins CORS proxy 串接 Yahoo Finance
  const symbols = tickers.join(',');
  const url = `https://query1.finance.yahoo.com/v7/finance/quote?symbols=${symbols}&fields=regularMarketPrice`;
  const proxy = `https://api.allorigins.win/get?url=${encodeURIComponent(url)}`;
  try {
    const res = await fetch(proxy);
    const outer = await res.json();
    const data = JSON.parse(outer.contents);
    data.quoteResponse.result.forEach(q => {
      livePrices[q.symbol] = q.regularMarketPrice;
    });
  } catch(e) { console.warn('美股報價失敗', e); }
}

async function fetchAllPrices() {
  if (positions.length === 0 && Object.keys(clecData).length === 0) return;
  const btn = document.getElementById('refresh-btn');
  if (btn) { btn.textContent = '⟳'; btn.style.color = 'var(--amber)'; }

  const twTickers = [...new Set([
    ...positions.filter(p => p.account === 'tw' || p.account === 'fut').map(p => p.ticker),
    ...Object.keys(clecData)
  ])].filter(Boolean);

  const usTickers = [...new Set(
    positions.filter(p => p.account === 'us').map(p => p.ticker)
  )].filter(Boolean);

  const tasks = [];
  if (twTickers.length > 0) tasks.push(fetchTW(twTickers));
  if (usTickers.length > 0) tasks.push(fetchUS(usTickers));
  await Promise.all(tasks);

  if (btn) { btn.textContent = '↻'; btn.style.color = 'var(--green)'; setTimeout(() => { btn.style.color = 'var(--text2)'; }, 2000); }
  const now = new Date().toLocaleString('zh-TW', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('last-updated').textContent = `報價更新 ${now}`;
  render();
}

// ── Font size ─────────────────────────────────────────
const FS_LEVELS = ['fs-sm','fs-md','fs-lg','fs-xl'];
let fsIdx = parseInt(localStorage.getItem('fsIdx') || '1');
function applyFs() {
  document.documentElement.className = FS_LEVELS[fsIdx];
}
function setFs(dir) {
  fsIdx = Math.max(0, Math.min(FS_LEVELS.length - 1, fsIdx + dir));
  localStorage.setItem('fsIdx', fsIdx);
  applyFs();
}
applyFs();

// ── Init ──────────────────────────────────────────────
document.getElementById('tx-date').valueAsDate = new Date();
document.getElementById('dca-start').valueAsDate = new Date();
render();
fetchAllPrices();
</script>
</body>
</html>
